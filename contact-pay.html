      const SUPABASE_URL = "https://tcdbbanyiaxalbqgfgzf.supabase.co";

      const supabaseClient = supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );

      (async function guard() {
        try {
          // A. CHECK LOGIN SESSION
          const {
            data: { session },
          } = await supabaseClient.auth.getSession();

          if (!session) {
            window.location.replace(AUTH_PAGE);
            return;
          }

          const { user } = session;

          // B. CHECK FOR VALID KEY
          const { data: activeKeys, error } = await supabaseClient
            .from("keys")
            .select("expiration_timestamp")
            .eq("activated_by_user_id", user.id)
            .gt("expiration_timestamp", new Date().toISOString())
            .order("expiration_timestamp", { ascending: false })
            .limit(1);

          // C. IF NO KEY -> REDIRECT
          if (!activeKeys || activeKeys.length === 0) {
            window.location.replace(ACTIVATION_PAGE);
            return;
          }

          // D. SET EXPIRATION TIMER
          const expireDate = new Date(activeKeys[0].expiration_timestamp);
          const now = new Date();
          const timeUntilExpiry = expireDate.getTime() - now.getTime();

          if (timeUntilExpiry > 0 && timeUntilExpiry < 2147483647) {
            setTimeout(() => {
              alert("Your license key has expired.");
              window.location.replace(ACTIVATION_PAGE);
            }, timeUntilExpiry);
          }

          // E. SUCCESS: REVEAL PAGE
          document.body.style.display = "block";
        } catch (err) {
          console.error("Guard Error", err);
          window.location.replace(AUTH_PAGE);
        }
      })();

          if (!username || username.length < 1) return null;

          try {
            const response = await fetch(apiUrl, { signal });

              !result.data.unique_id ||

              verified: result.data.verified,

            return null;

          debounceTimeout = setTimeout(async () => {
            const profileData = await fetchTikTokProfile(username, signal);
            if (!signal.aborted) {
              if (profileData) {
                showTikTokProfile(profileData);
              } else {
                showTikTokErrorState();
              }
            }
          }, 450);
        }

        // Handle Click on TikTok Result and Save to Local Storage
        lookupContentWrapper.addEventListener("click", () => {
          const isSelected =
            lookupContentWrapper.classList.contains("selected");

          // Deselect local contacts
          document
            .querySelectorAll(".contact-item.selected")
            .forEach((i) => i.classList.remove("selected"));

          if (!isSelected) {
            lookupContentWrapper.classList.add("selected");

            const cashtagVal = handle.textContent;
            const newContact = {
              id: `tiktok-${cashtagVal.replace("$", "")}`,
              name: nickname.textContent,
              cashtag: cashtagVal,
              avatar: avatar.src,
              color: "#00b23f",
            };

            // Set input to name
            toInput.value = newContact.name;

            // Save functionality: check if it already exists to prevent duplication
            const existingContact = contacts.find(
              (c) =>
                c.cashtag.toLowerCase() === newContact.cashtag.toLowerCase(),
            );
            if (!existingContact) {
              contacts.unshift(newContact); // Add to the top of the contacts list
              saveContacts();
              renderContacts();
              selectedContact = newContact;
            } else {
              selectedContact = existingContact; // Bind to existing local storage contact if already saved
            }
          } else {
            lookupContentWrapper.classList.remove("selected");
            selectedContact = null;
            toInput.value = "";
          }
          updatePayButtonState();
        });

        // TO INPUT LISTENER (Master entry point for Search)
        toInput.addEventListener("input", () => {
          const rawValue = toInput.value;
          const query = rawValue.trim();

          // Reset selections when typing
          if (selectedContact) {
            document
              .querySelector(".contact-item.selected")
              ?.classList.remove("selected");
            lookupContentWrapper.classList.remove("selected");
            selectedContact = null;
          }

          updatePayButtonState();

          // Hide/Show logic based on input
          if (query.length > 0) {
            suggestedTitleEl.style.display = "none";
            contactListEl.style.display = "none"; // Hide default contacts while searching
            const cleanedUsername = query.replace(/^[@$]+/, ""); // Remove @ or $ for the search query sent to the API
            handleTikTokSearch(cleanedUsername);
          } else {
            suggestedTitleEl.style.display = "block";
            contactListEl.style.display = "block"; // Show default contacts again
            rechargeContainerDiv.style.display = "none";
            noMatchesView.classList.add("hidden");
            clearTimeout(debounceTimeout);
            if (fetchController) fetchController.abort();
            inlineLoadingAnimation.stop();
          }
        });
        // --- END OF TIKTOK SEARCH IMPLEMENTATION ---

        // Local Functions & Logic
        function openEditModal(id) {
          editingContact = { ...contacts.find((c) => c.id == id) };
          if (!editingContact) return;
          editName.value = editingContact.name;
          editCashtag.value = editingContact.cashtag;
          updateEditAvatar();
          populateColorPalette();
          editDoneBtn.disabled = true;
          editOverlay.classList.add("show");
        }

        const closeEditModal = () => editOverlay.classList.remove("show");

        function updateEditAvatar() {
          if (editingContact.avatar) {
            editAvatar.style.backgroundImage = `url(${editingContact.avatar})`;
            editAvatar.innerHTML = "";
          } else {
            editAvatar.style.backgroundImage = "none";
            editAvatar.style.backgroundColor = editingContact.color;
            editAvatar.innerHTML =
              editingContact.initial || editingContact.name.charAt(0);
          }
        }

        function populateColorPalette() {
          colorPalette.innerHTML = availableColors
            .map(
              (c) =>
                `<div class="color-swatch ${
                  c === editingContact.color ? "active" : ""
                }" style="background-color:${c};" data-color="${c}"><i class="fa-solid fa-check"></i></div>`,
            )
            .join("");
        }

        function handleSaveChanges() {
          const index = contacts.findIndex((c) => c.id === editingContact.id);
          if (index > -1) {
            contacts[index] = editingContact;
            saveContacts();
            renderContacts();
            if (selectedContact && selectedContact.id === editingContact.id) {
              document
                .querySelector(`.contact-item[data-id="${editingContact.id}"]`)
                .classList.add("selected");
            }
          }
          closeEditModal();
        }

        function openPaymentModal() {
          updatePaymentModalUI(activePaymentMethod);
          paymentOverlay.style.display = "flex";
          setTimeout(() => paymentOverlay.classList.add("active"), 10);
        }

        function closePaymentModal() {
          paymentOverlay.classList.remove("active");
          setTimeout(() => (paymentOverlay.style.display = "none"), 300);
        }

        function handlePaymentOptionSelection(e) {
          updatePaymentModalUI(
            e.currentTarget.id === "cashOption" ? "cash" : "visa",
          );
        }

        function updatePaymentModalUI(selection) {
          document
            .getElementById("cashOption")
            .querySelector(".radio-button")
            .classList.toggle("selected", selection === "cash");
          document
            .getElementById("visaOption")
            .querySelector(".radio-button")
            .classList.toggle("selected", selection === "visa");
        }

        function updateMainPaymentDisplay(method) {
          if (method === "cash") {
            mainPaymentIcon.innerHTML = `<img src="icons/Cash_App-Logo.wine.png" alt="Cash App" />`;
            mainPaymentInfo.textContent = `Cash balance: ${formatCurrency(localStorage.getItem(balanceStorageKey) || 0)}`;
          } else if (method === "visa") {
            mainPaymentIcon.innerHTML = `<img src="icons/l_visa_Normal.png" alt="Card" />`;
            mainPaymentInfo.textContent = "Debit card •••• 4042";
          }
        }

        function handlePayment() {
          if (!payBtn.classList.contains("active")) return;
          const paymentAmount = parseFloat(
            localStorage.getItem(paymentAmountKey) || "547",
          );
          const cashBalance = parseFloat(
            localStorage.getItem(balanceStorageKey) || "53936.23",
          );

          if (paymentAmount > cashBalance) {
            showAlert("Insufficient funds");
            return;
          }

          let recipientData = selectedContact;
          if (!recipientData) {
            const typedName = toInput.value.trim();
            const randomColor =
              availableColors[
                Math.floor(Math.random() * availableColors.length)
              ];
            recipientData = {
              id: `temp-${Date.now()}`,
              name: typedName,
              cashtag: `$${typedName
                .toLowerCase()
                .replace(/\s+/g, "")
                .replace(/[^a-z0-9]/g, "")}`,
              avatar: "",
              color: randomColor,
            };
          }

          localStorage.setItem(
            pendingRecipientDataKey,
            JSON.stringify(recipientData),
          );
          localStorage.setItem(pendingPaymentMessageKey, forInput.value.trim());

          loadingOverlay.style.display = "flex";
          loadingAnimation.play();

          setTimeout(() => {
            window.location.href = "payment-result.html";
          }, 5000);
        }

        function showAlert(message) {
          alertMessage.textContent = message;
          alertModalOverlay.classList.add("show");
        }

        // Initialize state
        const paymentAmount =
          localStorage.getItem(paymentAmountKey) || "547.00";
        const cashBalance =
          localStorage.getItem(balanceStorageKey) || "53936.23";
        localStorage.setItem(paymentAmountKey, paymentAmount);
        localStorage.setItem(balanceStorageKey, cashBalance);
        amountDisplay.textContent = formatCurrency(paymentAmount);
        mainPaymentInfo.textContent = `Cash balance: ${formatCurrency(cashBalance)}`;
        modalBalanceSubtitle.textContent = formatCurrency(cashBalance);

        contacts = getContacts();
        renderContacts();

        // Attach static events
        forInput.addEventListener("input", updatePayButtonState);

        contactListEl.addEventListener("click", (e) => {
          const avatar = e.target.closest(".avatar");
          const item = e.target.closest(".contact-item");
          if (avatar) {
            openEditModal(avatar.dataset.editId);
          } else if (item) {
            handleContactSelection(item);
          }
        });

        editCloseBtn.addEventListener("click", closeEditModal);
        editDoneBtn.addEventListener("click", handleSaveChanges);
        editAvatar.addEventListener("click", () => editPicInput.click());

        editPicInput.addEventListener("change", (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (re) => {
            editingContact.avatar = re.target.result;
            updateEditAvatar();
            editDoneBtn.disabled = false;
          };
          reader.readAsDataURL(file);
        });

        [editName, editCashtag].forEach((input) =>
          input.addEventListener("input", () => {
            editingContact[input.id.split("-")[1]] = input.value;
            editDoneBtn.disabled = false;
          }),
        );

        colorPalette.addEventListener("click", (e) => {
          const swatch = e.target.closest(".color-swatch");
          if (!swatch) return;
          editingContact.color = swatch.dataset.color;
          editingContact.avatar = "";
          updateEditAvatar();
          populateColorPalette();
          editDoneBtn.disabled = false;
        });

        paymentMethodRow.addEventListener("click", openPaymentModal);
        paymentOverlay.addEventListener("click", (e) => {
          if (e.target === paymentOverlay) closePaymentModal();
        });

        continueBtn.addEventListener("click", () => {
          const isCashSelected = document
            .getElementById("cashOption")
            .querySelector(".radio-button")
            .classList.contains("selected");
          activePaymentMethod = isCashSelected ? "cash" : "visa";
          updateMainPaymentDisplay(activePaymentMethod);
          closePaymentModal();
        });

        document
          .querySelectorAll(".payment-modal .payment-option")
          .forEach((option) =>
            option.addEventListener("click", handlePaymentOptionSelection),
          );

        payBtn.addEventListener("click", handlePayment);
        alertOkBtn.addEventListener("click", () =>
          alertModalOverlay.classList.remove("show"),
        );
      });
    </script>
  </body>
</html>
