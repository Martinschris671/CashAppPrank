<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Activate | Cash Tool</title>

    <!-- Anti-Flicker Dark Mode Script -->
    <script>
      (function () {
        let theme =
          window.localStorage.getItem("app-theme-preference") || "system";
        if (theme === "system") {
          theme = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        }
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
      /* --- FONT SETUP --- */
      @font-face {
        font-family: "CashMarketR";
        font-style: normal;
        src: url(font/CashSans-Regular.otf);
        font-display: swap;
      }

      :root {
        /* --- Dark Mode Variables (Default) --- */
        --bg-color: #1c1c1e;
        --text-primary: #ffffff;
        --text-secondary: #8d8d8d;

        /* Input Colors */
        --input-bg: #474749;
        --input-placeholder: #a1a1a3;
        --input-shadow: 0 4px 12px rgba(0, 0, 0, 0.25);

        /* Button Colors */
        --btn-color: #00bc06;
        --btn-text: #ffffff;

        /* Status Colors */
        --error-color: #ff453a;
        --success-color: #00d632;
      }

      /* Light Mode Overrides based on data-theme attribute */
      [data-theme="light"] {
        --bg-color: #ffffff;
        --text-primary: #000000;
        --text-secondary: #6e6e6e;
        --input-bg: #f2f2f2;
        --input-placeholder: #a0a0a0;
        --input-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        --btn-color: #00bc06;
        --btn-text: #ffffff;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family:
          "CashMarketR",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        background-color: var(--bg-color);
        color: var(--text-primary);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }

      .app-container {
        width: 100%;
        max-width: 480px;
        margin: 0 auto;
        height: 100%;
        display: flex;
        flex-direction: column;
        padding: 20px 24px;
        position: relative;
      }

      /* --- HEADER --- */
      .header {
        margin-top: 40px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 60px;
      }

      .header-text h1 {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.5px;
        margin-bottom: 5px;
      }

      .header-text p {
        color: var(--text-secondary);
        font-size: 15px;
        font-weight: 500;
      }

      .header-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        margin-top: 10px;
      }

      .step-indicator {
        color: var(--text-primary);
        font-size: 14px;
        font-weight: 600;
      }

      .contact-link {
        margin-top: 6px;
        font-size: 12px;
        font-weight: 600;
        color: var(--btn-color);
        text-decoration: none;
        opacity: 0.9;
        transition: opacity 0.2s;
      }

      .contact-link:hover {
        opacity: 1;
        text-decoration: underline;
      }

      /* --- MAIN CONTENT --- */
      .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        margin-bottom: 120px;
      }

      .input-label {
        text-align: center;
        font-size: 17px;
        font-weight: 700;
        margin-bottom: 15px;
        display: block;
      }

      /* Status Message Styling */
      #status {
        text-align: center;
        min-height: 24px;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 15px;
        color: var(--error-color);
        opacity: 0.9;
      }

      .input-wrapper {
        position: relative;
        width: 100%;
      }

      input[type="text"] {
        width: 100%;
        background-color: var(--input-bg);
        border: none;
        border-radius: 12px;
        padding: 18px 20px;
        font-size: 16px;
        color: var(--text-primary);
        outline: none;
        font-family: inherit;
        box-shadow: var(--input-shadow);
        transition: all 0.3s ease;
        text-align: left;
      }

      input[type="text"]::placeholder {
        color: var(--input-placeholder);
        font-weight: 500;
      }

      input[type="text"]:focus {
        filter: brightness(1.05);
      }

      /* --- FOOTER / BUTTON --- */
      .footer {
        margin-bottom: 30px;
        width: 100%;
      }

      .continue-btn {
        width: 100%;
        background-color: var(--btn-color);
        color: var(--btn-text);
        border: none;
        border-radius: 50px;
        padding: 16px;
        font-size: 17px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        text-align: center;
        font-family:
          "CashMarketR",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
      }

      /* Logic: Green BG stays, Text fades */
      .continue-btn:disabled {
        cursor: default;
        background-color: var(--btn-color);
        opacity: 0.85;
        color: rgba(255, 255, 255, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <!-- Header -->
      <div class="header">
        <div class="header-text">
          <h1>Welcome</h1>
          <p>Cashapp V3 | ivcloned</p>
        </div>

        <div class="header-right">
          <div class="step-indicator">3 of 3</div>
          <a href="https://t.me/iv_cloned" target="_blank" class="contact-link"
            >Contact Me</a
          >
        </div>
      </div>

      <!-- Main Content -->
      <div class="main-content">
        <label class="input-label">Enter your serial key</label>

        <!-- Status Message Area -->
        <div id="status"></div>

        <div class="input-wrapper">
          <input
            type="text"
            id="key-input"
            placeholder="Serial Key"
            autocomplete="off"
          />
        </div>
      </div>

      <!-- Footer Button -->
      <div class="footer">
        <button id="activate-btn" class="continue-btn" disabled>
          Continue
        </button>
      </div>
    </div>

    <!-- SCRIPT SECTION -->
    <script>
      // --- CONFIGURATION ---
      // These keys must match your NEW CashApp Project
      const SUPABASE_URL = "https://tcdbbanyiaxalbqgfgzf.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRjZGJiYW55aWF4YWxicWdmZ3pmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2MTMwNjAsImV4cCI6MjA4MDE4OTA2MH0.RnCvwY7FNOCjDjH7LeWXrU0q0C3Tpm947N7idGtHe0I";

      const supabaseClient = supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );

      const AUTH_PAGE = "auth.html";
      const HOME_PAGE = "home.html";

      /* --- 1. Guard / Auth Check (Run Immediately) --- */
      (async function guard() {
        // A. Check if user is logged in
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();

        if (!session) {
          window.location.replace(AUTH_PAGE);
          return;
        }

        // B. Check if user already has an ACTIVE key
        // This will still work with the new RLS because we are only checking keys owned by THIS user.
        const { data: activeKey } = await supabaseClient
          .from("keys")
          .select("id")
          .eq("activated_by_user_id", session.user.id)
          .gt("expiration_timestamp", new Date().toISOString())
          .limit(1);

        if (activeKey && activeKey.length > 0) {
          window.location.replace(HOME_PAGE);
        }
      })();

      /* --- 2. UI Interaction Logic --- */
      const keyInput = document.getElementById("key-input");
      const activateBtn = document.getElementById("activate-btn");
      const statusDiv = document.getElementById("status");

      // Enable/Disable Button based on input
      keyInput.addEventListener("input", function () {
        const value = this.value.trim();
        if (value.length > 0) {
          activateBtn.removeAttribute("disabled");
          activateBtn.style.color = "#FFFFFF";
          activateBtn.style.opacity = "1";
        } else {
          activateBtn.setAttribute("disabled", "true");
          activateBtn.style.color = "rgba(255, 255, 255, 0.3)";
          activateBtn.style.opacity = "0.85";
        }
      });

      /* --- 3. Activation Logic (NEW ULTRA SECURE METHOD) --- */
      activateBtn.addEventListener("click", async () => {
        const key = keyInput.value.trim().toUpperCase(); // Force uppercase

        if (!key) return;

        // UI Loading State
        statusDiv.style.color = "var(--text-secondary)";
        statusDiv.innerText = "Verifying...";
        activateBtn.innerText = "Processing...";
        activateBtn.setAttribute("disabled", "true");

        try {
          // Get current user again to ensure session is valid
          const {
            data: { user },
          } = await supabaseClient.auth.getUser();
          if (!user) throw new Error("Session expired. Please login again.");

          // --- ULTRA SECURE DATABASE CALL ---
          // Instead of reading the table directly, we send the key to the secure function.
          const { data, error } = await supabaseClient.rpc("redeem_key", {
            input_key: key,
          });

          // Check if the system failed (network error, etc)
          if (error) {
            console.error("RPC Error:", error);
            throw new Error("System error. Please contact support.");
          }

          // Check if the DATABASE rejected the key (Invalid or Used)
          if (!data || data.success === false) {
            throw new Error(data.message || "Invalid serial key.");
          }

          // SUCCESS
          statusDiv.style.color = "var(--success-color)";
          statusDiv.innerText = "Success! Redirecting...";

          setTimeout(() => {
            window.location.replace(HOME_PAGE);
          }, 1500);
        } catch (err) {
          // FAILURE
          console.error("Activation Error:", err);
          statusDiv.style.color = "var(--error-color)";
          statusDiv.innerText = err.message; // Shows "Invalid key" or "Already used"

          // Reset Button
          activateBtn.innerText = "Continue";
          activateBtn.removeAttribute("disabled");
        }
      });
    </script>
  </body>
</html>
