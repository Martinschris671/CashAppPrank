    <script>
      // REPLACE THESE WITH YOUR KEYS
      const SUPABASE_URL = "https://tcdbbanyiaxalbqgfgzf.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRjZGJiYW55aWF4YWxicWdmZ3pmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2MTMwNjAsImV4cCI6MjA4MDE4OTA2MH0.RnCvwY7FNOCjDjH7LeWXrU0q0C3Tpm947N7idGtHe0I";

      const supabaseClient = supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY
      );
      const AUTH_PAGE = "auth.html";
      const KEY_PAGE = "keys.html";

      let kickTimer = null;
      let checkInterval = null;

      async function secureGuard() {
        try {
          // 1. Check Session
          const {
            data: { session },
            error,
          } = await supabaseClient.auth.getSession();

          if (error || !session) {
            throw new Error("No valid session");
          }

          const userId = session.user.id;

          // 2. Check for Valid Key
          // We fetch the latest key that hasn't expired yet
          const { data: activeKeys, error: keyError } = await supabaseClient
            .from("keys")
            .select("*")
            .eq("activated_by_user_id", userId)
            .gt("expiration_timestamp", new Date().toISOString())
            .order("expiration_timestamp", { ascending: false })
            .limit(1);

          if (keyError || !activeKeys || activeKeys.length === 0) {
            console.warn("No active key found.");
            window.location.replace(KEY_PAGE);
            return;
          }

          const currentKey = activeKeys[0];
          const expiresAt = new Date(currentKey.expiration_timestamp).getTime();
          const now = new Date().getTime();
          const msRemaining = expiresAt - now;

          // 3. Setup Auto-Kick Timer (Exact Expiration)
          if (msRemaining <= 0) {
            window.location.replace(KEY_PAGE);
            return;
          }

          console.log(
            `Key valid. Expires in ${Math.floor(msRemaining / 1000)} seconds.`
          );

          // Set the "Time's up" redirection
          if (kickTimer) clearTimeout(kickTimer);
          kickTimer = setTimeout(() => {
            alert("Your key has expired.");
            window.location.replace(KEY_PAGE);
          }, msRemaining);

          // 4. Setup Real-Time Security (If you revoke key in DB, they get kicked instantly)
          supabaseClient
            .channel("public:keys")
            .on(
              "postgres_changes",
              {
                event: "*",
                schema: "public",
                table: "keys",
                filter: `activated_by_user_id=eq.${userId}`,
              },
              (payload) => {
                // If the key is deleted or updated to be expired, re-run guard
                console.log("Key status changed in database, re-verifying...");
                secureGuard();
              }
            )
            .subscribe();

          // 5. SUCCESS: Reveal the Page
          document.body.style.display = "block";
        } catch (err) {
          console.error("Security Check Failed:", err);
          window.location.replace(AUTH_PAGE);
        }
      }

      // Run immediately
      secureGuard();

      // Double check every 60 seconds (In case user changes system clock)
      setInterval(() => {
        secureGuard();
      }, 60000);
    </script>
    <style>
      /* --- 1. FONTS & BASIC SETUP --- */
      @import url("https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap");

      :root {
        /* Light Theme (Default) */
        --bg-color: #f4f4f4;
        --card-bg-color: #ffffff;
        --text-color: #1a1a1a;
        --text-color-light: #707070;
        --hover-bg-color: #ebebeb;
        --accent-color: #00d54b; /* A vibrant green */
      }

      /* Dark Theme */
      [data-theme="dark"] {
        --bg-color: #000000;
        --card-bg-color: #121212;
        --text-color: #ffffff;
        --text-color-light: #a0a0a0;
        --hover-bg-color: #1f1f1f;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        /* This attribute will be changed by JavaScript */
        /* It drives the entire theme system */
        color-scheme: light dark;
      }
body{
  display: none;
}
      body {
        font-family: "Roboto Mono", monospace;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: grid;
        place-items: center;
        min-height: 100vh;
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      /* --- 2. THEME SWITCHER COMPONENT --- */
      .theme-switcher-container {
        width: 100%;
        max-width: 380px;
        background-color: var(--card-bg-color);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        transition: background-color 0.3s ease;
      }

      .switcher-header {
        font-size: 16px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--text-color-light);
        margin-bottom: 20px;
      }

      .theme-options {
        list-style: none;
      }

      .theme-option {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px;
        border-radius: 12px;
        cursor: pointer;
        transition: background-color 0.2s ease;
        user-select: none; /* Prevents text selection on click */
      }

      .theme-option:hover {
        background-color: var(--hover-bg-color);
      }

      .option-label {
        display: flex;
        align-items: center;
        gap: 16px;
        font-size: 16px;
        font-weight: 500;
      }

      /* --- 3. ICONS --- */
      .icon {
        width: 24px;
        height: 24px;
        color: var(--text-color-light); /* Icons take the lighter text color */
        transition: color 0.3s ease;
      }

      .checkmark-icon {
        width: 24px;
        height: 24px;
        color: var(--accent-color);
        opacity: 0; /* Hidden by default */
        transform: scale(0.8);
        transition: opacity 0.2s ease, transform 0.2s ease;
      }

      .theme-option.active .checkmark-icon {
        opacity: 1; /* Visible on the active option */
        transform: scale(1);
      }

      .theme-option.active .option-label .icon {
        color: var(--text-color); /* Active icon takes the main text color */
      }
    </style>
  </head>
