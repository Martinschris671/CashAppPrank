    />

    <link

      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Load Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      // REPLACE THESE WITH YOUR KEYS
      const SUPABASE_URL = "https://tcdbbanyiaxalbqgfgzf.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRjZGJiYW55aWF4YWxicWdmZ3pmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2MTMwNjAsImV4cCI6MjA4MDE4OTA2MH0.RnCvwY7FNOCjDjH7LeWXrU0q0C3Tpm947N7idGtHe0I";

      const supabaseClient = supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY
      );
      const AUTH_PAGE = "auth.html";
      const KEY_PAGE = "keys.html";

      let kickTimer = null;
      let checkInterval = null;

      async function secureGuard() {
        try {
          const {
            data: { session },
            error,
          } = await supabaseClient.auth.getSession();

          if (error || !session) {
            throw new Error("No valid session");
          }

          const userId = session.user.id;

          const { data: activeKeys, error: keyError } = await supabaseClient
            .from("keys")
            .select("*")
            .eq("activated_by_user_id", userId)
            .gt("expiration_timestamp", new Date().toISOString())
            .order("expiration_timestamp", { ascending: false })
            .limit(1);

          if (keyError || !activeKeys || activeKeys.length === 0) {
            console.warn("No active key found.");
            window.location.replace(KEY_PAGE);
            return;
          }

          const currentKey = activeKeys[0];
          const expiresAt = new Date(currentKey.expiration_timestamp).getTime();
          const now = new Date().getTime();
          const msRemaining = expiresAt - now;

          if (msRemaining <= 0) {
            window.location.replace(KEY_PAGE);
            return;
          }

          console.log(
            `Key valid. Expires in ${Math.floor(msRemaining / 1000)} seconds.`
          );

          if (kickTimer) clearTimeout(kickTimer);
          kickTimer = setTimeout(() => {
            alert("Your key has expired.");
            window.location.replace(KEY_PAGE);
          }, msRemaining);

          supabaseClient
            .channel("public:keys")
            .on(
              "postgres_changes",
              {
                event: "*",
                schema: "public",
                table: "keys",
                filter: `activated_by_user_id=eq.${userId}`,
              },
              (payload) => {
                console.log("Key status changed in database, re-verifying...");
                secureGuard();
              }
            )
            .subscribe();

          document.body.style.display = "block";
        } catch (err) {
          console.error("Security Check Failed:", err);
          window.location.replace(AUTH_PAGE);
        }
      }

      secureGuard();

      setInterval(() => {
        secureGuard();
      }, 60000);
    </script>
    <!-- Anti-Flicker Dark Mode Script -->
    <script>
      (function () {
        let theme =
          window.localStorage.getItem("app-theme-preference") || "system";
        if (theme === "system") {
          theme = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        }
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <style>
      body {
        display: none;
      }

      @font-face {
        font-family: "CashMarket";
        font-style: normal;
        src: url(font/CashSans-Regular.otf);
        font-display: swap;
      }
      /* --- LIGHT MODE THEME (DEFAULT) --- */
      :root {
        --padding-screen: 24px;
        --app-bg-color: #ffffff;
        --text-primary: #000000;
        --text-secondary: #6c757d;
        --accent-green: #00d54b;
        --accent-red: #ff3b30;
        --font-family: "CashMarket", -apple-system, BlinkMacSystemFont,
          sans-serif;
        --action-sheet-bg: #f0f0f0;
        --action-sheet-item-bg: #ffffff;
        --action-sheet-divider: #dcdcdc;
        --action-sheet-text: #000000;
        --status-icon: #ffffff;
        --menu-hover: #e5e5e5;
        --modal-bg: #ffffff;
      }

      /* --- DARK MODE THEME --- */
      [data-theme="dark"] {
        --app-bg-color: #000000;
        --text-primary: #ffffff;
        --text-secondary: #8e8e93;
        --action-sheet-bg: #000000;
        --action-sheet-item-bg: #1c1c1e;
        --action-sheet-divider: #3a3a3c;
        --action-sheet-text: #ffffff;
        --status-icon: #000;
        --menu-hover: #2c2c2e;
        --modal-bg: #1c1c1e;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family: var(--font-family);
        background-color: var(--app-bg-color);
        color: var(--text-primary);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition: background-color 0.3s, color 0.3s;
      }
      a {
        text-decoration: none;
        color: inherit;
      }
      .result-container {
        max-width: 450px;
        width: 100%;
        height: 100%;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        position: relative;
      }
      .result-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px;
        height: 65px;
      }
      .close-btn {
        width: 20px;
        height: 20px;
        cursor: pointer;
        color: var(--text-primary);
      }
      .menu-btn {
        background: none;
        border: none;
        font-size: 20px;
        color: transparent;
        cursor: pointer;
        padding: 8px;
        opacity: 1;
      }
      .result-content {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-start;
        padding: 0px var(--padding-screen) 0;
      }
      .status-icon {
        width: 54px;
        height: 54px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        margin-bottom: 24px;
        animation: pop-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      @keyframes pop-in {
        from {
          transform: scale(0.5);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      .status-icon i,
      .status-icon svg {
        color: var(--status-icon);
        width: 28px;
        height: 28px;
      }
      .status-icon.success {
        background-color: var(--accent-green);
      }
      .status-icon.pending {
        background-color: var(--accent-red);
      }
      .result-title {
        font-size: 24px;
        font-weight: 900;
        line-height: 1.3;
      }
      .result-details {
        font-size: 16px;
        color: var(--text-secondary);
        line-height: 1.5;
        margin-top: 16px;
        max-width: 320px;
      }
      .result-details p {
        margin-bottom: 1em;
      }
      .result-details p:last-child {
        margin-bottom: 0;
      }
      .result-footer {
        padding: 0 var(--padding-screen) 40px;
      }
      .done-btn {
        width: 100%;
        padding: 14px;
        background-color: #000;
        color: white;
        border: none;
        border-radius: 28px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transform: translateY(20px);
        font-family: var(--font-family);
      }
      [data-theme="dark"] .done-btn {
        background-color: var(--accent-green);
        color: #000000;
      }

      /* Learn More Link Style */
      .learn-more-link {
        text-decoration: underline;
        color: var(--text-primary);
        font-weight: 600;
        cursor: pointer;
      }

      /* --- INFO MODAL STYLES --- */
      .info-modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 6000;
        background-color: rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease, visibility 0.3s ease;
        backdrop-filter: blur(2px);
      }
      .info-modal-overlay.show {
        opacity: 1;
        visibility: visible;
      }
      .info-modal {
        background-color: var(--modal-bg);
        width: 85%;
        max-width: 320px;
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        transform: scale(0.95);
        transition: transform 0.2s ease;
      }
      .info-modal-overlay.show .info-modal {
        transform: scale(1);
      }
      .info-modal h3 {
        margin-bottom: 16px;
        font-size: 19px;
        font-weight: 700;
      }
      .info-modal p {
        font-size: 15px;
        line-height: 1.5;
        color: var(--text-secondary);
        margin-bottom: 24px;
      }
      .info-modal-btn {
        font-family: var(--font-family);
        width: 100%;
        padding: 12px;
        background-color: var(--action-sheet-bg);
        color: var(--text-primary);
        border: none;
        border-radius: 20px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }

      /* --- START: Redesigned Action Sheet Styles --- */
      .action-sheet-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 5000;
        background-color: rgba(0, 0, 0, 0.4);
        display: flex;
        justify-content: center;
        align-items: flex-end;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease, visibility 0.3s ease;
      }
      .action-sheet-overlay.show {
        opacity: 1;
        visibility: visible;
      }

      /* Common Sheet Container Styles */
      .action-sheet-container {
        font-family: var(--font-family);
        width: 100%;
        max-width: 450px;
        padding: 10px 10px 10px;
        background-color: var(--action-sheet-bg);
        border-top-left-radius: 14px;
        border-top-right-radius: 14px;
        /* Absolute position inside overlay to allow stacking */
        position: absolute;
        bottom: 0;

        transform: translateY(110%);
        transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }

      /* Active class slides it up */
      .action-sheet-container.active {
        transform: translateY(0);
      }

      .action-sheet-group {
        font-family: var(--font-family);
        background-color: var(--action-sheet-item-bg);
        border-radius: 14px;
        margin-bottom: 8px;
        overflow: hidden;
      }
      .action-sheet-item {
        font-family: var(--font-family);
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px;
        font-size: 17px;
        font-weight: 500;
        cursor: pointer;
        color: var(--action-sheet-text);
        border-bottom: 1px solid var(--action-sheet-divider);
        transition: background-color 0.2s;
      }
      .action-sheet-item:last-child {
        border-bottom: none;
      }
      .action-sheet-item:active {
        background-color: var(--menu-hover);
      }
      .action-sheet-item i {
        width: 22px;
        text-align: center;
        font-size: 18px;
        color: var(--text-secondary);
      }
      .action-sheet-cancel {
        font-family: var(--font-family);
        display: block;
        width: 100%;
        background-color: var(--action-sheet-item-bg);
        border-radius: 14px;
        padding: 16px;
        font-size: 17px;
        font-weight: 700;
        color: var(--action-sheet-text);
        text-align: center;
        border: none;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      .action-sheet-cancel:active {
        background-color: var(--menu-hover);
      }
      .action-sheet-confirm {
        font-family: var(--font-family);
        display: block;
        width: 100%;
        background-color: var(--action-sheet-item-bg);
        border-radius: 14px;
        padding: 16px;
        font-size: 17px;
        font-weight: 600;
        color: #007aff; /* iOS Blue */
        text-align: center;
        border: none;
        cursor: pointer;
        transition: background-color 0.2s;
        border-bottom: 1px solid var(--action-sheet-divider);
      }
      [data-theme="dark"] .action-sheet-confirm {
        color: var(--accent-green);
      }
      .action-sheet-confirm:active {
        background-color: var(--menu-hover);
      }

      /* EDIT SHEET SPECIFIC STYLES */
      .edit-header {
        padding: 16px;
        text-align: center;
        font-size: 15px;
        font-weight: 600;
        color: var(--text-secondary);
      }
      .input-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px 0 40px;
      }
      .currency-symbol {
        font-size: 32px;
        font-weight: 600;
        color: var(--text-primary);
        margin-right: 4px;
      }
      #fee-input {
        font-size: 32px;
        font-weight: 600;
        color: var(--text-primary);
        background: transparent;
        border: none;
        outline: none;
        width: 100px; /* Base width */
        font-family: var(--font-family);
        padding: 0;
        margin: 0;
      }
      /* Hide arrows on number input */
      #fee-input::-webkit-outer-spin-button,
      #fee-input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      /* --- END: Redesigned Action Sheet Styles --- */
    </style>
  </head>
  <body>

      <!-- Learn More Modal -->

          </button>

      </div>

      <!-- START: New Action Sheet HTML Structure -->
      <div class="action-sheet-overlay" id="action-sheet-overlay">
        <!-- MAIN MENU SHEET -->
        <div class="action-sheet-container" id="main-sheet">
          <!-- Group 1: Status Toggles -->
          <div class="action-sheet-group">
            <div class="action-sheet-item" data-status="pending">
              <i class="fa-solid fa-hourglass-half"></i
              ><span>Mark as Pending</span>
            </div>
            <div class="action-sheet-item" data-status="success">
              <i class="fa-solid fa-check"></i><span>Mark as Successful</span>
            </div>
          </div>

          <!-- Group 2: Edit Configuration -->
          <div class="action-sheet-group">
            <div class="action-sheet-item" id="edit-verif-fee-btn">
              <i class="fa-solid fa-pen-to-square"></i
              ><span>Edit Verification Fee</span>
            </div>
          </div>

          <button class="action-sheet-cancel" id="main-cancel-btn">
            Cancel
          </button>
        </div>

        <!-- EDIT FEE SHEET -->
        <div class="action-sheet-container" id="edit-sheet">
          <div class="action-sheet-group">
            <div class="edit-header">Enter Verification Amount</div>

              <span class="currency-symbol">$</span>

                autocomplete="off"

          <button class="action-sheet-cancel" id="edit-cancel-btn">Back</button>

      <!-- END: New Action Sheet HTML Structure -->
    </div>

    <script>
      const resultContent = document.getElementById("result-content");
      const doneBtn = document.getElementById("done-btn");
      const menuBtn = document.getElementById("menu-btn");

      const actionSheetOverlay = document.getElementById(
        "action-sheet-overlay"
      );
      const mainSheet = document.getElementById("main-sheet");
      const editSheet = document.getElementById("edit-sheet");

      const mainCancelBtn = document.getElementById("main-cancel-btn");
      const editCancelBtn = document.getElementById("edit-cancel-btn");

      const editVerifFeeBtn = document.getElementById("edit-verif-fee-btn");
      const saveFeeBtn = document.getElementById("save-fee-btn");
      const feeInput = document.getElementById("fee-input");

      const learnMoreModal = document.getElementById("learn-more-modal");
      const learnMoreText = document.getElementById("learn-more-text");

      const paymentAmountKey = "paymentAmount";
      const pendingRecipientDataKey = "pendingRecipientData";
      const pendingPaymentMessageKey = "pendingPaymentMessage";
      const balanceKey = "cashAppBalance";
      const transactionsKey = "cashAppTransactions";

      // NEW: Key for storing status preference & verification fee
      const statusPreferenceKey = "paymentStatusPreference";
      const verificationFeeKey = "verificationFeeAmount";

      let tempTransaction = null;

      // Helper to get stored fee or default to 50
      function getVerificationFee() {
        return localStorage.getItem(verificationFeeKey) || "50";
      }

      // Functions to handle the modal
      function openLearnMoreModal(amount, cashtag, fee) {
        // --- THIS IS THE UPDATED SECTION (OPTION 1) ---
        learnMoreText.innerHTML = `The transfer of <strong>${amount}</strong> to <strong>${cashtag}</strong> exceeds the instant deposit limit for this account type.<br><br>To verify the recipient's identity and process this high-volume transaction, a refundable server confirmation fee of <strong>$${fee}</strong> is required to release the pending balance.`;
        learnMoreModal.classList.add("show");
      }

      function closeLearnMoreModal() {
        learnMoreModal.classList.remove("show");
      }

      const statusTemplates = {
        success: (amount, contactName, note) => ({
          iconClass: "success",
          icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24.0 24.0"><path fill="currentColor" d="M22.757 5.65l-12 14a1 1 0 0 1-1.517 0l-6-7 1.517-1.3L10 17.462 21.239 4.35l1.518 1.3z"/></svg>',
          title: `You sent ${amount} to ${contactName}`,
          buttonText: "Done",
        }),
        pending: (amount, cashtag) => {
          const fee = getVerificationFee();
          return {
            iconClass: "pending",
            icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M18 6L6 18M6 6l12 12"/></svg>',
            title: `Payment couldn't be completed`,
            details: `<p>Payment on hold for security reasons. <span class="learn-more-link" onclick="openLearnMoreModal('${amount}', '${cashtag}', '${fee}')">Learn More</span></p>`,
            buttonText: "OK",
          };
        },
      };

      function formatCurrency(amount) {
        return `$${Number(amount).toLocaleString("en-US", {
          minimumFractionDigits: 0,
          maximumFractionDigits: 0,
        })}`;
      }

      function renderResult(transaction) {
        const recipient = transaction.recipient;
        if (!recipient) {
          resultContent.innerHTML = `<h1 class="result-title">Error: Recipient data missing.</h1>`;
          return;
        }

        const template = statusTemplates[transaction.status](
          formatCurrency(transaction.amount),
          transaction.status === "pending" ? recipient.cashtag : recipient.name,
          transaction.note
        );

        resultContent.innerHTML = `<div class="status-icon ${
          template.iconClass
        }">${template.icon}</div><h1 class="result-title">${
          template.title
        }</h1>${
          template.details
            ? `<div class="result-details">${template.details}</div>`
            : ""
        }`;
        doneBtn.textContent = template.buttonText;
        const iconEl = resultContent.querySelector(".status-icon");
        iconEl.style.animation = "none";
        void iconEl.offsetWidth;
        iconEl.style.animation = "";
      }

      function updateTransactionStatus(newStatus) {
        if (!tempTransaction) return;
        tempTransaction.status = newStatus;
        localStorage.setItem(statusPreferenceKey, newStatus);
        renderResult(tempTransaction);
      }

      function finalizeTransaction() {
        if (!tempTransaction) return;

        let balance = parseFloat(localStorage.getItem(balanceKey) || "0");
        const transactions =
          JSON.parse(localStorage.getItem(transactionsKey)) || [];

        if (
          tempTransaction.type === "payment" &&
          (tempTransaction.status === "success" ||
            tempTransaction.status === "pending")
        ) {
          balance -= tempTransaction.amount;
        }

        transactions.push(tempTransaction);
        localStorage.setItem(balanceKey, balance.toString());
        localStorage.setItem(transactionsKey, JSON.stringify(transactions));

        localStorage.removeItem(paymentAmountKey);
        localStorage.removeItem(pendingRecipientDataKey);
        localStorage.removeItem(pendingPaymentMessageKey);

        window.dispatchEvent(new Event("storage"));
      }

      // --- Action Sheet Logic ---
      function openOverlay() {
        actionSheetOverlay.classList.add("show");
      }
      function closeOverlay() {
        actionSheetOverlay.classList.remove("show");
        // Reset sheets
        mainSheet.classList.remove("active");
        editSheet.classList.remove("active");
      }

      // Open Main Menu
      function showMainMenu() {
        openOverlay();
        editSheet.classList.remove("active");
        mainSheet.classList.add("active");
      }

      // Swap to Edit Menu
      function showEditMenu() {
        // Pre-fill input
        feeInput.value = getVerificationFee();

        mainSheet.classList.remove("active");

        // Slight delay to allow fade out before fade in, or instant for "swap" feel
        // Let's do instant for snappy feel
        editSheet.classList.add("active");
        setTimeout(() => feeInput.focus(), 100);
      }

      document.addEventListener("DOMContentLoaded", () => {
        const paymentAmount = parseFloat(
          localStorage.getItem(paymentAmountKey)
        );
        const recipientDataString = localStorage.getItem(
          pendingRecipientDataKey
        );
        const paymentMessage =
          localStorage.getItem(pendingPaymentMessageKey) || "";

        if (!paymentAmount || !recipientDataString) {
          window.location.href = "pay.html";
          return;
        }

        const recipient = JSON.parse(recipientDataString);
        const savedStatus =
          localStorage.getItem(statusPreferenceKey) || "success";

        tempTransaction = {
          id: Date.now(),
          type: "payment",
          amount: paymentAmount,
          recipient: recipient,
          note: paymentMessage,
          date: new Date().toISOString(),
          status: savedStatus,
        };

        renderResult(tempTransaction);

        // --- Event Listeners ---

        // Open Menu
        menuBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          showMainMenu();
        });

        // Click outside to close
        actionSheetOverlay.addEventListener("click", (e) => {
          if (e.target === actionSheetOverlay) {
            closeOverlay();
          }
        });

        // Close info modal on overlay click
        learnMoreModal.addEventListener("click", (e) => {
          if (e.target === learnMoreModal) {
            closeLearnMoreModal();
          }
        });

        // Main Cancel
        mainCancelBtn.addEventListener("click", closeOverlay);

        // Edit Cancel (Back to Main)
        editCancelBtn.addEventListener("click", showMainMenu);

        // Open Edit Sheet
        editVerifFeeBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          showEditMenu();
        });

        // Save Fee
        saveFeeBtn.addEventListener("click", () => {
          const newFee = feeInput.value;
          if (newFee && !isNaN(newFee)) {
            localStorage.setItem(verificationFeeKey, newFee.trim());
            if (tempTransaction.status === "pending") {
              renderResult(tempTransaction);
            }
            closeOverlay();
          }
        });

        // Status Selection
        mainSheet.addEventListener("click", (e) => {
          const item = e.target.closest(".action-sheet-item");
          if (item && item.dataset.status) {
            updateTransactionStatus(item.dataset.status);
            closeOverlay();
          }
        });

        doneBtn.addEventListener("click", (e) => {
          e.preventDefault();
          finalizeTransaction();
          window.location.href = "pay.html";
        });
      });
    </script>
  </body>
</html>
